#     :executable: gcc
#     :arguments:
#       - ${1}
#       - -o ${2}
#       - -LMiddlewares/CMSIS
#       - -lcmsisdsp
#       - -lm

:tools:
  :test_linker:
    :executable: gcc_cmsis
    :arguments:
      - ${1}
      - -o ${2}

# :flags:
#   :test:
#     :link:
#       - -LMiddlewares/CMSIS
#       - -lcmsisdsp  
#       - -lm

:compiler:
  :options:
    :test:
      - -Wall
      - -Wextra
      - -Wpedantic
    :release:
      - -O2 